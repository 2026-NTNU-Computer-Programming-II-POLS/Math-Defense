# Production compose: builds the frontend to a static bundle, serves it through
# nginx, and reverse-proxies /api to the FastAPI backend.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Source trees are NOT bind-mounted (unlike docker-compose.yml). Images are
# self-contained and match what was built in CI.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mathdefense
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: math_defense
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/pg_init_roles.sh:/docker-entrypoint-initdb.d/init-roles.sh:ro
    # No ports: exposed. Only the backend talks to PG across the docker network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathdefense -d math_defense"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # M20: harden the postgres container.
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  backend:
    build:
      # Repo root so Dockerfile can COPY both backend/ and shared/ into the image.
      context: .
      dockerfile: backend/Dockerfile
    # M18: enumerate only the vars the backend actually needs instead of
    # mounting the full .env (which also contains POSTGRES_PASSWORD). The DB
    # password is already embedded in DATABASE_URL; there is no reason to
    # expose it separately to the backend process.
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      # C-02: enable per-IP rate limiting behind the nginx reverse proxy.
      # TRUSTED_PROXY_IPS uses the RFC-1918 range that Docker Compose assigns
      # to containers in user-defined networks; adjust to match your subnet if
      # you customise docker-compose networking.
      PROXY_MODE: "true"
      TRUSTED_PROXY_IPS: "172.16.0.0/12"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    # M19: run pending migrations before the server starts. `alembic upgrade head`
    # is idempotent — safe to run on every deploy; if no migrations are pending
    # it exits 0 immediately.
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    # M20: harden the backend container.
    read_only: true
    tmpfs: ["/tmp"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    ports:
      # :80 stays mapped so nginx-tls.conf can 301-redirect plain HTTP to HTTPS.
      - "80:8080"
      - "443:8443"
    environment:
      # Override for production domains; envsubst expands these in nginx.conf.
      CORS_ORIGIN_1: ${CORS_ORIGIN_1:-http://localhost:5173}
      CORS_ORIGIN_2: ${CORS_ORIGIN_2:-http://localhost:3000}
      # Set to the backend API origin when it differs from the frontend origin
      # (e.g. API_ORIGIN=https://api.example.com). Blank by default (same-origin
      # deployments only need connect-src 'self').
      API_ORIGIN: ${API_ORIGIN:-}
    volumes:
      # C-03: mount as a template so the nginx-unprivileged entrypoint runs
      # envsubst on ${CORS_ORIGIN_1}/${CORS_ORIGIN_2} before nginx starts.
      # Mounting directly to conf.d/default.conf bypasses envsubst and leaves
      # the literal "${CORS_ORIGIN_1}" string as the map key → all preflights 403.
      - ./nginx-tls.conf:/etc/nginx/templates/default.conf.template:ro
      - ./security-headers.conf:/etc/nginx/security-headers.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    # Without this, `depends_on: frontend: service_healthy` (future scalers, a
    # load-balancer sidecar, or `docker compose up --wait`) cannot tell a
    # half-started nginx from a ready one and sends traffic too early.
    # TCP probe only: an HTTP probe on :8080 would follow the HTTP→HTTPS
    # redirect to :8443 and then fail the self-signed cert verify. A TCP probe
    # is sufficient to prove nginx parsed its config and bound its sockets.
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 && nc -z localhost 8443"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    # M20: harden the frontend container. nginx writes nothing at runtime
    # beyond the pid file and temp dirs that are already in tmpfs.
    read_only: true
    tmpfs: ["/tmp", "/var/cache/nginx", "/var/run"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: mathdefense
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: math_defense
      BACKUP_DIR: /backups
      RETENTION_DAYS: "7"
    volumes:
      - ./scripts/pg_backup.sh:/usr/local/bin/pg_backup.sh:ro
      - pg_backups:/backups
    # Run daily at 02:00 UTC via a lightweight cron loop.
    # Script is mounted :ro so chmod is impossible — invoke via /bin/sh.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "0 2 * * * /bin/sh /usr/local/bin/pg_backup.sh" | crontab -
        crond -f -l 2
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  postgres_data:
  pg_backups:
