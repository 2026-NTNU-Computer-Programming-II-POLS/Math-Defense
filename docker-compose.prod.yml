# Production compose: builds the frontend to a static bundle, serves it through
# nginx, and reverse-proxies /api to the FastAPI backend.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# The frontend source tree is NOT bind-mounted (unlike docker-compose.yml), so
# the image is self-contained and matches what was built in CI.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
