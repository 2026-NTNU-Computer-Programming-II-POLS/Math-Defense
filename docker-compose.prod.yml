# Production compose: builds the frontend to a static bundle, serves it through
# nginx, and reverse-proxies /api to the FastAPI backend.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Source trees are NOT bind-mounted (unlike docker-compose.yml). Images are
# self-contained and match what was built in CI.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mathdefense
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: math_defense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports: exposed. Only the backend talks to PG across the docker network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathdefense -d math_defense"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      # Repo root so Dockerfile can COPY both backend/ and shared/ into the image.
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    ports:
      # :80 stays mapped so nginx-tls.conf can 301-redirect plain HTTP to HTTPS.
      - "80:8080"
      - "443:8443"
    environment:
      # Override for production domains; envsubst expands these in nginx.conf.
      CORS_ORIGIN_1: ${CORS_ORIGIN_1:-http://localhost:5173}
      CORS_ORIGIN_2: ${CORS_ORIGIN_2:-http://localhost:3000}
    volumes:
      - ./nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
