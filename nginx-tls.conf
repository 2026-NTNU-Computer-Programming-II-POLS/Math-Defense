# TLS-enabled nginx config for Math Defense production.
#
# Mounted as a template so the nginx-unprivileged entrypoint runs envsubst on
# ${CORS_ORIGIN_1}/${CORS_ORIGIN_2} before nginx starts (see docker-compose.prod.yml):
#   volumes:
#     - ./nginx-tls.conf:/etc/nginx/templates/default.conf.template:ro
#     - ./security-headers.conf:/etc/nginx/security-headers.conf:ro
#     - ./certs:/etc/nginx/certs:ro
#
# Requires fullchain.pem and privkey.pem in the ./certs directory.
# Cert provisioning — obtain certs before starting the stack:
#
#   Option A (Let's Encrypt / certbot standalone, run once):
#     certbot certonly --standalone -d your.domain
#     cp /etc/letsencrypt/live/your.domain/fullchain.pem ./certs/fullchain.pem
#     cp /etc/letsencrypt/live/your.domain/privkey.pem   ./certs/privkey.pem
#
#   Option B (self-signed, dev/test only):
#     mkdir -p certs
#     openssl req -x509 -newkey rsa:4096 -nodes -days 365 \
#       -keyout certs/privkey.pem -out certs/fullchain.pem \
#       -subj "/CN=localhost"
#
# nginx will refuse to start if ./certs is empty or either file is missing.

map $http_origin $cors_origin {
    default                         "";
    "${CORS_ORIGIN_1}"              $http_origin;
    "${CORS_ORIGIN_2}"              $http_origin;
}

# HTTP → HTTPS redirect. Unprivileged nginx image binds 8080/8443 inside the
# container; docker-compose maps host 80→8080 and 443→8443.
server {
    listen 8080;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    # Explicitly exclude weak/legacy suites so a future OpenSSL default change
    # can't silently re-enable RC4/DES/EXPORT. Prior `HIGH:!aNULL:!MD5` relied
    # on OpenSSL's shipping defaults for the rest.
    ssl_ciphers         HIGH:!aNULL:!eNULL:!MD5:!EXPORT:!DES:!RC4:!PSK:!SRP:!3DES;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # See nginx.conf — small JSON payloads only; make the cap explicit.
    client_max_body_size 1m;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # See nginx.conf for why `expires` is used rather than `add_header Cache-Control`.
    location = /index.html {
        expires -1;
    }
    location /assets/ {
        # See nginx.conf — nested add_header would drop inherited security headers.
        expires 1y;
    }

    include /etc/nginx/security-headers.conf;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ${API_ORIGIN}; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $cors_probe "$request_method:$cors_origin";

        if ($cors_probe = "OPTIONS:") {
            return 403;
        }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin  always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-CSRF-Token" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            include /etc/nginx/security-headers.conf;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        # M16: disable gzip for API responses to prevent BREACH side-channel on
        # CSRF tokens that appear in JSON bodies.
        gzip off;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # M17: use $remote_addr so a client-supplied XFF cannot spoof the IP
        # that the backend rate-limiter and PROXY_MODE trust.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Expose-Headers;
    }
}
