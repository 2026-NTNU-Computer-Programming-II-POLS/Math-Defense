<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sprite Exporter — Math Game (怪物 + 塔)</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, "Segoe UI", sans-serif;
        background: #f4f6f9;
        color: #222;
      }
      h1 { font-size: 20px; margin: 0 0 4px; }
      h2 { font-size: 16px; margin: 28px 0 12px; }
      p.lead { margin: 0 0 16px; color: #555; font-size: 14px; }
      .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
      button {
        font: inherit;
        padding: 8px 16px;
        border: 1px solid #c3ccd6;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      button:hover { background: #eef2f6; }
      #status { font-size: 13px; color: #4060a0; min-height: 18px; margin: 4px 0 12px; }
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 16px;
      }
      figure.cell {
        margin: 0;
        padding: 12px;
        background:
          repeating-conic-gradient(#e6e9ee 0% 25%, #f4f6f9 0% 50%) 0 / 20px 20px;
        border: 1px solid #dde3ea;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      figcaption { text-align: center; display: flex; flex-direction: column; }
      figcaption strong { font-size: 15px; }
      figcaption span { font-size: 12px; color: #888; }
    </style>
  </head>
  <body>
    <h1>怪物 + 塔 圖片匯出工具</h1>
    <p class="lead">
      透明背景 · 乾淨本體 + 識別特徵 · 不含血條/升級環。每個單位存成獨立 PNG，外加每類一張總覽圖。
      輸出到資料夾時會自動分成 <code>monsters/</code> 與 <code>towers/</code>。
      （棋盤格底紋只是預覽用，實際輸出為透明背景。）
    </p>
    <div class="toolbar">
      <button id="saveFolder">選擇資料夾並輸出全部 PNG</button>
      <button id="downloadEach">逐一下載（備用）</button>
    </div>
    <div id="status">載入中…</div>

    <h2>怪物 Monsters</h2>
    <div id="monsters" class="gallery"></div>

    <h2>塔 Towers</h2>
    <div id="towers" class="gallery"></div>

    <script type="module" src="./export-sprites.ts"></script>
  </body>
</html>
