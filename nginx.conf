# Reverse-proxy + SPA host for Math Defense in production.
#
# CORS: instead of echoing any `Origin` (which combined with Allow-Credentials
# is effectively *-with-credentials — browsers treat that as a misconfiguration),
# match against an explicit allow-list and only emit the CORS headers when the
# request's Origin is recognised. Extend `$cors_origin` below when adding a new
# deployment host.
#
# Nested `if` blocks aren't supported by nginx, so we combine method+origin
# into a single probe variable and compare against flat literals.

# CORS_ORIGIN_1 and CORS_ORIGIN_2 are set by docker-compose environment or
# envsubst at deploy time. Defaults match local development; override for prod.
map $http_origin $cors_origin {
    default                         "";
    "${CORS_ORIGIN_1}"              $http_origin;
    "${CORS_ORIGIN_2}"              $http_origin;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Cap request bodies. The API only accepts small JSON payloads (auth,
    # score submission); anything larger is almost certainly abuse. Set
    # explicitly so the policy survives nginx default changes.
    client_max_body_size 1m;

    # Compress text assets on the fly. The bundle is small but JS/CSS still
    # benefit; WASM is pre-compressed by emscripten, so don't double-compress it.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # Cache policy: hashed bundle assets get a year, index.html gets nothing.
    # Using `expires` (not `add_header Cache-Control`) so the server-level
    # `add_header` security directives are still inherited — a nested
    # `add_header` would silently drop every inherited header.
    location = /index.html {
        expires -1;
    }
    location /assets/ {
        # `expires` alone emits Cache-Control: max-age=31536000 without
        # re-opening the add_header scope — so CSP / X-Frame-Options / etc.
        # from the server block still apply. A nested `add_header` here would
        # drop every inherited security header; not worth `immutable` for that.
        expires 1y;
    }

    # Security headers. CSP is the last line of defence if XSS sneaks past
    # output encoding — it stops an injected script from exfiltrating the
    # auth token to an attacker-controlled origin. 'unsafe-inline' is kept
    # for styles because Vue SFC styles can inline small blocks; remove it
    # once the build pipeline nonces every style.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Frontend — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API reverse proxy
    location /api/ {
        # $cors_probe is "METHOD:ORIGIN-OR-EMPTY"; lets us tell a whitelisted
        # preflight apart from an unknown-origin preflight without nested ifs.
        set $cors_probe "$request_method:$cors_origin";

        # Preflight from an un-whitelisted origin — fail loudly (403) rather
        # than silently allowing it, so misconfiguration is visible.
        if ($cors_probe = "OPTIONS:") {
            return 403;
        }

        # Whitelisted preflight: answer directly so the backend never sees OPTIONS.
        # Security headers are repeated here because nginx's add_header in a nested
        # block drops all inherited server-level headers.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin  always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-CSRF-Token" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Propagate CORS headers produced by the backend to the client.
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Expose-Headers;
    }
}
