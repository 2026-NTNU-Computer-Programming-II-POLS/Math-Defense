# Reverse-proxy + SPA host for Math Defense in production.
#
# CORS: instead of echoing any `Origin` (which combined with Allow-Credentials
# is effectively *-with-credentials — browsers treat that as a misconfiguration),
# match against an explicit allow-list and only emit the CORS headers when the
# request's Origin is recognised. Extend `$cors_origin` below when adding a new
# deployment host.
#
# Nested `if` blocks aren't supported by nginx, so we combine method+origin
# into a single probe variable and compare against flat literals.

map $http_origin $cors_origin {
    default                         "";
    "http://localhost:5173"         $http_origin;
    "http://localhost:3000"         $http_origin;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API reverse proxy
    location /api/ {
        # $cors_probe is "METHOD:ORIGIN-OR-EMPTY"; lets us tell a whitelisted
        # preflight apart from an unknown-origin preflight without nested ifs.
        set $cors_probe "$request_method:$cors_origin";

        # Preflight from an un-whitelisted origin — fail loudly (403) rather
        # than silently allowing it, so misconfiguration is visible.
        if ($cors_probe = "OPTIONS:") {
            return 403;
        }

        # Whitelisted preflight: answer directly so the backend never sees OPTIONS.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin  always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Propagate CORS headers produced by the backend to the client.
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Expose-Headers;
    }
}
