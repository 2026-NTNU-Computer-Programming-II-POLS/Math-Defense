name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mathdefense
          # Intentional placeholder — config.py skips the reject_weak_database_url
          # check when _is_test_env() is true, so "changeme" is safe here.
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: math_defense
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mathdefense -d math_defense"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements-dev.txt
      - name: Setup emsdk
        # Backend strict-replay verification (test_score_verify.py
        # TestVerifyScoreReplayV2Strict) routes through compute_total_score
        # in the committed math_engine.wasm. If the C source in wasm/ drifts
        # from the committed binary, the backend's recomputed score disagrees
        # with the Python-mirror expected and every v2 replay test 422s.
        # Rebuilding here keeps source and binary in lock-step regardless of
        # whether the committing developer had emsdk locally.
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          # Pin to the same tag backend/Dockerfile uses (emscripten/emsdk:5.0.7)
          # so CI, the prod image, and a manual rebuild all emit a byte-identical
          # math_engine.wasm. Unpinned, this action floats to the latest emsdk and
          # a toolchain bump could silently drift the score-parity fixtures.
          version: 5.0.7
      - name: Build WASM
        # Job-level default working-directory is `backend`, so `../wasm`
        # resolves to <workspace>/wasm. Matches the frontend job's
        # `npm run prebuild` which executes `cd ../wasm && make`.
        run: cd ../wasm && make
      - name: Audit Python dependencies
        # All three ignored advisories are non-actionable — no version bump fixes them:
        #   PYSEC-2025-183 (CVE-2025-45768) — disputed by PyJWT maintainers; the OSV
        #     range has no fix event, so it flags every PyJWT release. The "weak
        #     encryption" claim only applies when the app picks a short HMAC key, and
        #     config.py enforces a >=32-char SECRET_KEY, so it does not apply here.
        #   PYSEC-2024-311 (CVE-2024-47813) — fixed in wasmtime 25.0.2; we run 44.0.0.
        #     False positive: the OSV range events are malformed, so its enumerated
        #     version list wrongly includes releases past the fix (27.0.0-44.0.0).
        #   PYSEC-2026-151 (CVE-2026-34983) — fixed in wasmtime 43.0.1; we run 44.0.0.
        #     False positive from the same malformed OSV range.
        # Revisit when any of these gets a real, applicable fix version.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2024-311 \
            --ignore-vuln PYSEC-2026-151
      - name: Verify WASM runtime loads
        # Backend WASM-dependent tests (test_wasm_runtime, test_score_verify)
        # skip silently when is_wasm_loaded() is False — a missing or corrupt
        # committed math_engine.wasm, or a broken wasmtime install, would leave
        # the bit-exact score-verification contract unverified while CI stays
        # green. Fail loudly here instead of letting those tests skip.
        run: python -c "from app.infrastructure.wasm_runtime import is_wasm_loaded; assert is_wasm_loaded(), 'WASM runtime failed to load; see wasm_runtime logs'"
      - name: Migrations replay from a fresh DB
        # Guards the "tests pass but a fresh deploy can't boot" class of bug.
        # conftest.py builds schema via Base.metadata.create_all, so pytest
        # never runs the alembic chain — a non-replayable migration (e.g. an
        # unconditional CREATE of a table an earlier revision already made)
        # stays green in CI yet fails every brand-new `alembic upgrade head`.
        # Run the real chain from zero against the empty `math_defense` DB
        # (pytest uses the separate `math_defense_test`, so they don't collide)
        # and fail loudly here instead. `alembic current` prints the landed head.
        env:
          SECRET_KEY: ci-placeholder-secret-key-not-used-in-prod
          DATABASE_URL: postgresql+psycopg://mathdefense:changeme@localhost:5432/math_defense
          CORS_ORIGINS: http://localhost:5173
          FRONTEND_URL: http://localhost:5173
        run: |
          alembic upgrade head
          alembic current
      - name: pytest
        env:
          SECRET_KEY: ci-placeholder-secret-key-not-used-in-prod
          # conftest derives the test DB name by appending _test; it also creates
          # the DB on first run against the postgres admin DB.
          # "changeme" is safe here: config.py's reject_weak_database_url validator
          # is bypassed when _is_test_env() is true (CI=true is set by GitHub Actions).
          DATABASE_URL: postgresql+psycopg://mathdefense:changeme@localhost:5432/math_defense
          CORS_ORIGINS: http://localhost:5173
          FRONTEND_URL: http://localhost:5173
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Build backend Docker image
        run: docker build -f backend/Dockerfile -t backend-test .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-fund
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          # Pin to backend/Dockerfile's emscripten/emsdk:5.0.7 — see the backend
          # job above for why an unpinned (latest) emsdk risks parity drift.
          version: 5.0.7
      - name: Build WASM
        run: npm run prebuild
      - name: Verify WASM artifact
        # npm run prebuild can exit 0 yet emit a binary missing an export, which
        # makes WasmBridge silently fall back to JS and quietly breaks the FU-A
        # bit-exact score contract. Instantiate the artifact and assert every
        # wasm/Makefile EXPORTED_FUNCTIONS symbol is present.
        run: npm run verify-wasm
      - name: Type-check
        run: npx vue-tsc -b
      - name: Arch check
        run: npm run arch-check
      - name: Event registry check
        run: npm run event-registry-check
      - name: Lint non-ASCII comments
        run: npm run lint-chinese-comments
      - name: Lint determinism
        run: npm run lint-determinism
      - name: Unit tests
        run: npx vitest run
