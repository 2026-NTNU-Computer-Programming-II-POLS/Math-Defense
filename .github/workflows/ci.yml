name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mathdefense
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: math_defense
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mathdefense -d math_defense"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements-dev.txt
      - name: Audit Python dependencies
        run: pip install pip-audit && pip-audit -r requirements.txt
      - name: pytest
        env:
          SECRET_KEY: ci-placeholder-secret-key-not-used-in-prod
          # conftest derives the test DB name by appending _test; it also creates
          # the DB on first run against the postgres admin DB.
          DATABASE_URL: postgresql+psycopg://mathdefense:changeme@localhost:5432/math_defense
          CORS_ORIGINS: http://localhost:5173
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-fund
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      # Skip the `prebuild` WASM compile — emsdk isn't available on the runner
      # and the build step is only used here to drive vue-tsc type-checking.
      - name: Type-check
        run: npx vue-tsc -b
      - name: Arch check
        run: npm run arch-check
      - name: Debt ledger
        run: npm run check-debt-ledger
      - name: Validate levels
        run: npm run validate-levels
      - name: Lint non-ASCII comments
        run: npm run lint-chinese-comments
      - name: Unit tests
        run: npx vitest run
