name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mathdefense
          # Intentional placeholder — config.py skips the reject_default_password
          # check when _is_test_env() is true, so "changeme" is safe here.
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: math_defense
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mathdefense -d math_defense"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements-dev.txt
      - name: Audit Python dependencies
        run: pip install pip-audit && pip-audit -r requirements.txt
      - name: pytest
        env:
          SECRET_KEY: ci-placeholder-secret-key-not-used-in-prod
          # conftest derives the test DB name by appending _test; it also creates
          # the DB on first run against the postgres admin DB.
          # "changeme" is safe here: config.py's reject_default_password validator
          # is bypassed when _is_test_env() is true (CI=true is set by GitHub Actions).
          DATABASE_URL: postgresql+psycopg://mathdefense:changeme@localhost:5432/math_defense
          CORS_ORIGINS: http://localhost:5173
          FRONTEND_URL: http://localhost:5173
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-fund
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021 # v14
      - name: Build WASM
        run: npm run prebuild
      - name: Type-check
        run: npx vue-tsc -b
      - name: Arch check
        run: npm run arch-check
      - name: Event registry check
        run: npm run event-registry-check
      - name: Lint non-ASCII comments
        run: npm run lint-chinese-comments
      - name: Lint determinism
        run: npm run lint-determinism
      - name: Unit tests
        run: npx vitest run
