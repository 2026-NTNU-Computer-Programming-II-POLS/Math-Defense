services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mathdefense
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: math_defense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathdefense -d math_defense"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Explicitly set environment variables to ensure they're loaded
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Pin container UID/GID to the typical Linux host dev user so files written
    # through the ./backend bind-mount below are owned by the host user instead
    # of root. The Dockerfile's `useradd --system app` picks a UID from the
    # system range (<1000), which would leave bind-mount files owned by a UID
    # the host user can't edit without sudo. Override here in dev only; the
    # image itself still drops privileges for prod (see backend/Dockerfile).
    user: "1000:1000"
    volumes:
      - ./backend:/app
      # shared_constants.py resolves /app/../shared → /shared at runtime.
      # Mounted read-only so backend can't mutate the JSON the frontend also imports.
      - ./shared:/shared:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      # Vite's dev-server proxy target for /api. Default in vite.config.ts is
      # http://localhost:8000, which only works when Vite runs on the host —
      # inside this container `localhost` is the frontend container itself, so
      # /api/* would 502 (Bad Gateway). Point it at the backend service name
      # on the compose network instead.
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      # vite.config.ts aliases @shared → resolve(__dirname, '..', 'shared'),
      # which inside the container is /app/../shared → /shared.
      # Mounted read-only; frontend only imports JSON from it.
      - ./shared:/shared:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  frontend_node_modules:
